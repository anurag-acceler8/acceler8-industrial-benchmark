<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Capability Stress-Test Review</title>
<style>
  :root {
    --bg: #f6f5f2;
    --surface: #ffffff;
    --ink: #1c1b19;
    --muted: #5c5a55;
    --line: #e4e1da;
    --line-strong: #cfcabe;
    --accent: #1f3a2e;
    --accent-soft: #e8efe9;
    --go: #1b6b3a;
    --go-bg: #e6f4eb;
    --amber: #9a6700;
    --amber-bg: #fef6e0;
    --red: #a32020;
    --red-bg: #fceaea;
    --strong: #1b6b3a;
    --strong-bg: #e6f4eb;
    --moderate: #9a6700;
    --moderate-bg: #fef6e0;
    --weak: #a32020;
    --weak-bg: #fceaea;
    --shadow: 0 1px 2px rgba(28,27,25,.04), 0 8px 24px rgba(28,27,25,.06);
    --radius: 12px;
    --font: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --sans: "Avenir Next", "Segoe UI", system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    min-height: 100vh;
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  header.page-head {
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--line);
  }
  header.page-head h1 {
    font-family: var(--font);
    font-weight: 600;
    font-size: clamp(1.6rem, 3.5vw, 2.1rem);
    letter-spacing: -0.02em;
    margin: 0 0 0.4rem;
    color: var(--accent);
  }
  header.page-head .sub {
    color: var(--muted);
    font-size: 0.95rem;
    margin: 0;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    margin-bottom: 1.25rem;
    padding: 0.45rem 0.85rem;
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    background: var(--surface);
    color: var(--ink);
    font: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    text-decoration: none;
  }
  .back-btn:hover { background: var(--accent-soft); border-color: var(--accent); }

  /* Role list */
  .role-grid {
    display: grid;
    gap: 0.85rem;
  }
  .role-card {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    box-shadow: var(--shadow);
    cursor: pointer;
    font: inherit;
    color: inherit;
    transition: border-color .15s, transform .15s;
  }
  .role-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .role-card-top {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 0.6rem;
    margin-bottom: 0.45rem;
  }
  .role-card h2 {
    font-family: var(--font);
    font-size: 1.2rem;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .role-card .blurb {
    color: var(--muted);
    font-size: 0.9rem;
    margin: 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .rating-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-top: 0.75rem;
  }
  .cap-chip {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    border-radius: 999px;
    border: 1px solid transparent;
  }

  /* Badges */
  .badge {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 650;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 0.28rem 0.65rem;
    border-radius: 999px;
    white-space: nowrap;
  }
  .badge-go { background: var(--go-bg); color: var(--go); }
  .badge-go_with_additions { background: var(--amber-bg); color: var(--amber); }
  .badge-no_go { background: var(--red-bg); color: var(--red); }
  .badge-unknown { background: #eee; color: var(--muted); }

  .rating-strong { background: var(--strong-bg); color: var(--strong); border-color: #c5e3d0; }
  .rating-moderate { background: var(--moderate-bg); color: var(--moderate); border-color: #f0df9a; }
  .rating-weak { background: var(--weak-bg); color: var(--weak); border-color: #f0c4c4; }
  .rating-unknown { background: #eee; color: var(--muted); }

  /* Detail */
  .detail-head h1 {
    font-family: var(--font);
    font-size: clamp(1.5rem, 3.2vw, 2rem);
    margin: 0 0 0.75rem;
    letter-spacing: -0.02em;
  }
  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem 1rem;
    align-items: center;
    margin-bottom: 1.5rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  section.block {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 1.25rem 1.35rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
  }
  section.block h2 {
    font-family: var(--font);
    font-size: 1.15rem;
    margin: 0 0 0.85rem;
    letter-spacing: -0.01em;
  }
  section.block h3 {
    font-size: 0.95rem;
    font-weight: 650;
    margin: 1rem 0 0.4rem;
    color: var(--accent);
  }
  .prose { color: var(--ink); margin: 0; }
  .prose + .prose { margin-top: 0.75rem; }
  .label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 0.25rem;
  }

  /* Capability cards */
  .cap-list { display: grid; gap: 0.85rem; }
  .cap-card {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    background: #fafaf8;
  }
  .cap-card-head {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    margin-bottom: 0.65rem;
  }
  .cap-card-head h3 {
    margin: 0;
    font-family: var(--font);
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--ink);
  }
  .flag {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.2rem 0.55rem;
    border-radius: 6px;
  }
  .flag-yes { background: var(--go-bg); color: var(--go); }
  .flag-no { background: var(--red-bg); color: var(--red); }
  .gap-note {
    margin: 0.5rem 0 0;
    padding: 0.65rem 0.75rem;
    background: var(--red-bg);
    border-radius: 8px;
    color: var(--red);
    font-size: 0.9rem;
  }

  details.evidence {
    margin-top: 0.65rem;
    border-top: 1px solid var(--line);
    padding-top: 0.55rem;
  }
  details.evidence summary {
    cursor: pointer;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--accent);
    user-select: none;
  }
  details.evidence summary:hover { text-decoration: underline; }
  .evidence-list {
    list-style: none;
    margin: 0.6rem 0 0;
    padding: 0;
  }
  .evidence-list li {
    padding: 0.55rem 0;
    border-bottom: 1px solid var(--line);
  }
  .evidence-list li:last-child { border-bottom: none; }
  .metric {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 0.2rem;
  }
  .reasoning { font-size: 0.9rem; color: var(--muted); margin: 0; }

  /* Missing / proposed questions */
  .miss-list { display: grid; gap: 0.85rem; }
  .miss-card {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    background: #fafaf8;
  }
  .miss-card .cap-tag {
    font-size: 0.75rem;
    font-weight: 650;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }
  .q-box {
    margin-top: 0.75rem;
    padding: 0.85rem;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .q-type {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 0.15rem 0.45rem;
    border-radius: 4px;
    margin-bottom: 0.4rem;
  }
  .q-text { margin: 0 0 0.5rem; font-weight: 550; }
  .options {
    margin: 0;
    padding-left: 1.2rem;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .options li { margin: 0.15rem 0; }

  .notes-list {
    margin: 0;
    padding-left: 1.2rem;
  }
  .notes-list li { margin: 0.45rem 0; color: var(--muted); }

  .empty {
    color: var(--muted);
    font-style: italic;
    margin: 0;
  }

  footer.page-foot {
    margin-top: 2.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 0.8rem;
  }

  @media (max-width: 560px) {
    .wrap { padding: 1.25rem 1rem 3rem; }
    section.block { padding: 1rem; }
  }
</style>
</head>

    .replace(/</g, "&lt;")

    .replace(/"/g, "&quot;");
}

function ratingLabel(r) {
  if (!r) return "—";
  return String(r).charAt(0).toUpperCase() + String(r).slice(1);
}

function shortCap(name) {
  const m = String(name || "").match(/^(C\d+)/i);
  return m ? m[1] : String(name || "").slice(0, 8);
}

function slugify(name) {
  return String(name || "")
    .toLowerCase()
    .replace(/&/g, "and")
    .replace(/\//g, "-")
    .replace(/\s+/g, "_")
    .replace(/__+/g, "_");
}

function findRole(key) {
  const k = decodeURIComponent(key || "").toLowerCase();
  return (DATA.roles || []).find((r) => {
    const slug = (r.role_slug || slugify(r.role)).toLowerCase();
    return slug === k || String(r.role).toLowerCase() === k;
  });
}

function evidenceHtml(items, title) {
  const list = items || [];
  if (!list.length) {
    return `<details class="evidence"><summary>${esc(title)} (0)</summary>
      <p class="empty">None listed.</p></details>`;
  }
  const lis = list.map((e) => `
    <li>
      <div class="metric">${esc(e.we_metric || "metric")}</div>
      <p class="reasoning">${esc(e.reasoning || "")}</p>
    </li>`).join("");
  return `<details class="evidence">
    <summary>${esc(title)} (${list.length})</summary>
    <ul class="evidence-list">${lis}</ul>
  </details>`;
}

function renderHome() {
  const roles = DATA.roles || [];
  const cards = roles.map((r) => {
    const overall = r.overall || {};
    const rec = overall.recommendation || "unknown";
    const chips = (r.capability_coverage || []).map((c) => {
      const rating = (c.rating || "unknown").toLowerCase();
      return `<span class="cap-chip rating-${esc(rating)}">${esc(shortCap(c.capability))}: ${esc(ratingLabel(c.rating))}</span>`;
    }).join("");
    const slug = r.role_slug || slugify(r.role);
    const blurb = overall.summary
      ? esc(overall.summary).slice(0, 180) + (overall.summary.length > 180 ? "…" : "")
      : "No summary available.";
    return `
      <button type="button" class="role-card" data-slug="${esc(slug)}">
        <div class="role-card-top">
          <h2>${esc(r.role)}</h2>
          <span class="badge badge-${esc(rec)}">${esc(recLabel(rec))}</span>
        </div>
        <p class="blurb">${blurb}</p>
        <div class="rating-row">${chips}</div>
      </button>`;
  }).join("");

  return `
    <header class="page-head">
      <h1>Capability Stress-Test Review</h1>
      <p class="sub">${roles.length} role${roles.length === 1 ? "" : "s"} assessed · open a role for the full audit</p>
    </header>
    <div class="role-grid">${cards || '<p class="empty">No successful stress-test results found.</p>'}</div>
    <footer class="page-foot">Built ${esc(DATA.built_at || "")} · Share this single HTML file — no server needed.</footer>
  `;
}

function proposedQuestionHtml(pq) {
  if (!pq || typeof pq !== "object") return "";
  const opts = (pq.options || []).map((o) => `<li>${esc(o)}</li>`).join("");
  const yesNo = pq.yes_no_text
    ? `<p class="reasoning" style="margin:0 0 .4rem"><strong>Yes/No gate:</strong> ${esc(pq.yes_no_text)}</p>`
    : "";
  const metric = pq.proposed_we_metric
    ? `<p class="reasoning" style="margin:.5rem 0 0"><strong>Metric:</strong> <span class="metric">${esc(pq.proposed_we_metric)}</span></p>`
    : "";
  return `
    <div class="q-box">
      <div class="q-type">${esc(pq.type || "Question")}</div>
      <p class="q-text">${esc(pq.question_text || "")}</p>
      ${yesNo}
      ${opts ? `<ul class="options">${opts}</ul>` : ""}
      ${metric}
    </div>`;
}

function renderDetail(role) {
  const overall = role.overall || {};
  const rec = overall.recommendation || "unknown";
  const caps = (role.capability_coverage || []).map((c) => {
    const rating = (c.rating || "unknown").toLowerCase();
    const detectable = !!c.misalignment_detectable;
    const gap = c.misalignment_gap
      ? `<p class="gap-note"><strong>Gap:</strong> ${esc(c.misalignment_gap)}</p>`
      : "";
    return `
      <article class="cap-card">
        <div class="cap-card-head">
          <h3>${esc(c.capability)}</h3>
          <span class="badge rating-${esc(rating)}">${esc(ratingLabel(c.rating))}</span>
        </div>
        <div>
          <span class="flag ${detectable ? "flag-yes" : "flag-no"}">
            Misalignment ${detectable ? "detectable" : "not detectable"}
          </span>
        </div>
        ${gap}
        ${evidenceHtml(c.direct_evidence, "Direct evidence")}
        ${evidenceHtml(c.indirect_evidence, "Indirect evidence")}
      </article>`;
  }).join("");

  const missing = role.missing_from_audit || [];
  const missHtml = missing.length
    ? missing.map((m) => `
        <article class="miss-card">
          <div class="cap-tag">${esc(m.capability || "")}</div>
          <p class="label">Missing behaviour</p>
          <p class="prose">${esc(m.missing_behaviour || "")}</p>
          <p class="label" style="margin-top:.75rem">Proposed question</p>
          ${proposedQuestionHtml(m.proposed_question)}
        </article>`).join("")
    : '<p class="empty">No additions proposed.</p>';

  const notes = role.framework_notes || [];
  const notesHtml = notes.length
    ? `<ul class="notes-list">${notes.map((n) => `<li>${esc(n)}</li>`).join("")}</ul>`
    : '<p class="empty">No framework notes.</p>';

  const additions = overall.minimum_additions != null
    ? `<span>· Minimum additions: <strong>${esc(overall.minimum_additions)}</strong></span>`
    : "";
  const qCount = role.question_count != null
    ? `<span>· ${esc(role.question_count)} survey questions</span>`
    : "";

  return `
    <button type="button" class="back-btn" id="back-btn">← All roles</button>
    <header class="detail-head">
      <h1>${esc(role.role)}</h1>
      <div class="meta-row">
        <span class="badge badge-${esc(rec)}">${esc(recLabel(rec))}</span>
        ${additions}
        ${qCount}
      </div>
    </header>

    <section class="block">
      <h2>Overall assessment</h2>
      <p class="label">Summary</p>
      <p class="prose">${esc(overall.summary || "—")}</p>
      <h3>Biggest weakness</h3>
      <p class="prose">${esc(overall.biggest_weakness || "—")}</p>
      <h3>Recommendation</h3>
      <p class="prose"><strong>${esc(recLabel(rec))}</strong>${
        overall.minimum_additions != null
          ? ` — add at least ${esc(overall.minimum_additions)} question(s) before relying on this survey for capability assignment.`
          : ""
      }</p>
    </section>

    <section class="block">
      <h2>Capability coverage</h2>
      <div class="cap-list">${caps || '<p class="empty">No coverage data.</p>'}</div>
    </section>

    <section class="block">
      <h2>Missing from audit</h2>
      <p class="prose" style="color:var(--muted);margin-bottom:1rem;font-size:.9rem">
        Behaviours the survey cannot yet evidence, with proposed questions to close the gap.
      </p>
      <div class="miss-list">${missHtml}</div>
    </section>

    <section class="block">
      <h2>Framework notes</h2>
      ${notesHtml}
    </section>

    <footer class="page-foot">Built ${esc(DATA.built_at || "")} · Share this single HTML file — no server needed.</footer>
  `;
}

function route() {
  const hash = (location.hash || "").replace(/^#\/?/, "");
  const app = document.getElementById("app");
  if (!hash || hash === "home") {
    app.innerHTML = renderHome();
    app.querySelectorAll(".role-card").forEach((btn) => {
      btn.addEventListener("click", () => {
        location.hash = "#/" + btn.getAttribute("data-slug");
      });
    });
    window.scrollTo(0, 0);
    return;
  }
  const role = findRole(hash);
  if (!role) {
    app.innerHTML = `
      <button type="button" class="back-btn" id="back-btn">← All roles</button>
      <p class="empty">Role not found.</p>`;
    document.getElementById("back-btn").onclick = () => { location.hash = ""; };
    return;
  }
  app.innerHTML = renderDetail(role);
  document.getElementById("back-btn").onclick = () => { location.hash = ""; };
  window.scrollTo(0, 0);
}

window.addEventListener("hashchange", route);
route();
</script>
</body>
</html>
