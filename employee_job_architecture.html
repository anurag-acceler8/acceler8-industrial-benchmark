<meta charset="UTF-8">

<title>Job Architecture — Technology Service</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1b2027; --muted:#647488; --faint:#94a3b8; --line:#e2e8f0;
  --bg:#f8fafc; --card:#fff; --brand:#74045c; --brand-700:#5a0349;
  --brand-50:#fdf2f9;
  --radius:12px;
  --shadow:0 1px 2px rgba(15,23,42,.04), 0 6px 18px rgba(15,23,42,.04);
  --nav-w:300px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Space Grotesk",system-ui,sans-serif;color:var(--ink);
  background:radial-gradient(900px 360px at 0% 0%,rgba(116,4,92,.05),transparent 55%),var(--bg);
  min-height:100vh;line-height:1.4;
}
.shell{display:grid;grid-template-columns:var(--nav-w) 1fr;min-height:100vh;max-width:1400px;margin:0 auto}
@media (max-width:900px){.shell{grid-template-columns:1fr}}
.nav{border-right:1px solid var(--line);background:var(--card);padding:20px 14px 28px;position:sticky;top:0;height:100vh;overflow:auto}
@media (max-width:900px){.nav{position:relative;height:auto;border-right:none;border-bottom:1px solid var(--line)}}
.nav-brand{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand);margin-bottom:4px}
.nav-title{font-size:16px;font-weight:700;letter-spacing:-.02em;margin-bottom:16px}
.dept{font-size:12px;font-weight:700;padding:8px 10px;border-radius:8px;background:var(--brand-50);color:var(--brand-700);margin-bottom:10px}
.sub{margin:0 0 12px 6px;padding-left:10px;border-left:2px solid var(--line)}
.sub-name{font-size:12px;font-weight:700;color:var(--ink);margin:0 0 6px}
.lvl{display:flex;align-items:center;gap:8px;width:100%;padding:7px 8px;margin:2px 0;border:none;background:transparent;border-radius:8px;font:inherit;text-align:left;cursor:pointer;color:var(--ink)}
.lvl:hover{background:#f1f5f9}
.lvl.on{background:var(--brand);color:#fff}
.lvl.on .lvl-code{background:rgba(255,255,255,.2);color:#fff}
.lvl-code{flex-shrink:0;font-size:10px;font-weight:700;background:#f1f5f9;color:var(--muted);padding:2px 6px;border-radius:999px}
.lvl-label{font-size:12px;font-weight:600;line-height:1.25}
.lvl-meta{display:block;font-size:10px;font-weight:500;opacity:.7;margin-top:1px}
.main{padding:22px 22px 40px;min-width:0}
.crumb{font-size:12px;color:var(--muted);margin-bottom:10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.crumb strong{color:var(--ink);font-weight:600}
.crumb .sep{color:var(--faint)}
.main-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:18px}
.main-head h1{font-size:clamp(22px,2.6vw,28px);font-weight:700;letter-spacing:-.03em;line-height:1.15}
.main-head .subline{font-size:13px;color:var(--muted);margin-top:4px}
.badge{font-size:11px;font-weight:600;padding:6px 10px;border-radius:999px;background:#fffbeb;border:1px solid #fde68a;color:#b45309}
.q{margin-bottom:20px}
.q-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.q-num{width:22px;height:22px;border-radius:7px;background:var(--brand-50);color:var(--brand);display:grid;place-items:center;font-size:11px;font-weight:700;flex-shrink:0}
.q-head h2{font-size:14px;font-weight:700}
.q-head p{font-size:12px;color:var(--muted);margin-left:auto}
.place{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media (max-width:800px){.place{grid-template-columns:1fr 1fr}}
.place-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow)}
.place-card .k{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
.place-card .v{font-size:13px;font-weight:600;line-height:1.3}
.place-flow{margin-top:10px;display:flex;flex-wrap:wrap;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--muted)}
.place-flow span{background:var(--card);border:1px solid var(--line);padding:5px 9px;border-radius:999px}
.place-flow .arr{border:none;background:none;padding:0;color:var(--faint)}
.rel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.rel-stack{display:flex;flex-direction:column;align-items:stretch;gap:0;max-width:520px}
.rel-node{border:1px solid var(--line);border-radius:10px;padding:11px 13px;background:#fff;text-align:left;width:100%;font:inherit;color:inherit;cursor:default}
.rel-node.clickable{cursor:pointer;transition:border-color .15s,background .15s}
.rel-node.clickable:hover{border-color:var(--brand);background:var(--brand-50)}
.rel-node.current{border-color:var(--brand);background:var(--brand-50);box-shadow:0 0 0 1px var(--brand);cursor:default}
.rel-node .t{font-size:13px;font-weight:700}
.rel-node .m{font-size:11px;color:var(--muted);margin-top:2px;font-weight:500}
.rel-link{display:flex;justify-content:center;padding:5px 0;color:var(--brand);font-size:11px;font-weight:700;letter-spacing:.04em}
.rel-group{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.rel-empty{font-size:13px;color:var(--muted);padding:4px 0}
.diff{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:6px}
@media (max-width:900px){.diff{grid-template-columns:1fr 1fr}}
.diff-item{padding:10px 12px}
.diff-item .k{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
.diff-item .v{font-size:13px;font-weight:600;line-height:1.3}
.missing{background:var(--card);border:1px dashed var(--line);border-radius:var(--radius);padding:16px 18px;font-size:13px;color:var(--muted)}
.areas{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media (max-width:1100px){.areas{grid-template-columns:1fr 1fr}}
@media (max-width:620px){.areas{grid-template-columns:1fr}}
.area{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px;display:flex;flex-direction:column}
.area.high{border-top:3px solid var(--brand)}
.area.medium{border-top:3px solid #94a3b8}
.area.low{border-top:3px solid #cbd5e1}
.area-top{display:flex;justify-content:space-between;gap:8px;margin-bottom:8px}
.area-top h3{font-size:13px;font-weight:700;line-height:1.25}
.weight{font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 7px;border-radius:999px;background:#f1f5f9;color:var(--muted);flex-shrink:0}
.area.high .weight{background:var(--brand-50);color:var(--brand-700)}
.area ol{list-style:none;flex:1;display:flex;flex-direction:column;gap:5px}
.area li{font-size:12px;padding-left:11px;position:relative;line-height:1.35}
.area li::before{content:"";position:absolute;left:0;top:6px;width:5px;height:5px;border-radius:50%;background:var(--brand);opacity:.55}
.area-foot{margin-top:8px;padding-top:7px;border-top:1px solid var(--line);font-size:11px;font-weight:600;color:var(--muted)}
.foot{margin-top:8px;font-size:11px;color:var(--faint)}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:14px}
</style>
</head>

function esc(s) {
  return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function norm(s) { return String(s || "").trim().toUpperCase(); }
function uniq(arr) {
  var out = [], seen = {};
  arr.forEach(function (x) {
    var k = String(x);
    if (!k || seen[k]) return;
    seen[k] = 1; out.push(x);
  });
  return out;
}
function subLabel(sub) {
  var s = String(sub || "").trim();
  return s || "Department leadership";
}

var byName = {};
EMPLOYEES.forEach(function (e) { byName[norm(e.name)] = e; });

/** Tree: department → subdepartment → job_role (from employees only) */
function buildTree(employees) {
  var depts = {};
  employees.forEach(function (e) {
    var dept = e.department || "Unknown";
    var sub = subLabel(e.subdepartment);
    var role = e.job_role || "Unassigned";
    if (!depts[dept]) depts[dept] = {};
    if (!depts[dept][sub]) depts[dept][sub] = {};
    if (!depts[dept][sub][role]) {
      depts[dept][sub][role] = { role: role, levels: {}, titles: {}, count: 0 };
    }
    var bucket = depts[dept][sub][role];
    bucket.count += 1;
    if (e.level != null) bucket.levels[e.level] = 1;
    if (e.job_title) bucket.titles[e.job_title] = 1;
  });
  return depts;
}

function peopleInRole(roleName) {
  return EMPLOYEES.filter(function (e) { return e.job_role === roleName; });
}

/** Upward chain from employee using manager names present in EMPLOYEES only */
function upwardChain(person) {
  var chain = [];
  var cur = person;
  var guard = 0;
  while (cur && guard++ < 40) {
    chain.push(cur);
    var mgr = byName[norm(cur.manager)];
    if (!mgr) break;
    cur = mgr;
  }
  return chain;
}

function directReportsOf(names) {
  var set = {};
  names.forEach(function (n) { set[norm(n)] = 1; });
  return EMPLOYEES.filter(function (e) { return set[norm(e.manager)]; })
    .sort(function (a, b) {
      var d = (a.level || 99) - (b.level || 99);
      return d || a.name.localeCompare(b.name);
    });
}

/** Attributes from employee fields only — skips fields already shown in placement. */
function differentiateFromPeople(people) {
  if (!people.length) return [];
  var managers = uniq(people.map(function (p) { return p.manager; }).filter(Boolean));
  var managerRoles = uniq(managers.map(function (m) {
    var e = byName[norm(m)];
    return e ? e.job_role : null;
  }).filter(Boolean));
  var locations = uniq(people.map(function (p) { return p.location; }).filter(Boolean));
  var direct = people.reduce(function (s, p) { return s + (p.direct_reports || 0); }, 0);
  var indirect = people.reduce(function (s, p) { return s + (p.indirect_reports || 0); }, 0);

  return [
    ["People in role", String(people.length)],
    ["Reports to (manager)", managers.join(", ") || "—"],
    ["Manager job role", managerRoles.join(", ") || "—"],
    ["Direct reports (sum)", String(direct)],
    ["Indirect reports (sum)", String(indirect)],
    ["Locations", locations.join(", ") || "—"]
  ];
}

var TREE = buildTree(EMPLOYEES);
var roleIndex = {};
EMPLOYEES.forEach(function (e) {
  if (e.job_role) roleIndex[e.job_role] = 1;
});
var activeRole = "Engagement Delivery Manager";

function renderTree() {
  var html = "";
  Object.keys(TREE).sort().forEach(function (dept) {
    html += '<div class="dept">' + esc(dept) + "</div>";
    var subs = TREE[dept];
    Object.keys(subs).sort().forEach(function (sub) {
      html += '<div class="sub"><div class="sub-name">' + esc(sub) + "</div>";
      var roles = Object.keys(subs[sub]).map(function (k) { return subs[sub][k]; });
      roles.sort(function (a, b) {
        var la = Math.min.apply(null, Object.keys(a.levels).map(Number));
        var lb = Math.min.apply(null, Object.keys(b.levels).map(Number));
        if (la !== lb) return la - lb;
        return a.role.localeCompare(b.role);
      });
      roles.forEach(function (r) {
        var levels = Object.keys(r.levels).map(Number).sort(function (a, b) { return a - b; });
        var lvlLabel = levels.map(function (l) { return "L" + l; }).join("/");
        var on = r.role === activeRole;
        html +=
          '<button type="button" class="lvl' + (on ? " on" : "") + '" data-role="' + esc(r.role) + '">' +
            '<span class="lvl-code">' + esc(lvlLabel) + "</span>" +
            '<span class="lvl-label">' + esc(r.role) +
              '<span class="lvl-meta">' + r.count + " people</span></span>" +
          "</button>";
      });
      html += "</div>";
    });
  });
  document.getElementById("tree").innerHTML = html;
  document.querySelectorAll(".lvl").forEach(function (btn) {
    btn.onclick = function () {
      activeRole = btn.getAttribute("data-role");
      render();
    };
  });
}

      parentMap[mgr.job_role] = { role: mgr.job_role, levels: {}, titles: {}, count: 0 };
    }
    parentMap[mgr.job_role].count += 1;
    parentMap[mgr.job_role].levels[mgr.level] = 1;
    parentMap[mgr.job_role].titles[mgr.job_title] = 1;
  });
  var parentRoles = Object.keys(parentMap).map(function (k) { return parentMap[k]; })
    .sort(function (a, b) { return b.count - a.count; });

  var childMap = {};
  reports.forEach(function (r) {
    if (!childMap[r.job_role]) {
      childMap[r.job_role] = { role: r.job_role, levels: {}, titles: {}, count: 0 };
    }
    childMap[r.job_role].count += 1;
    childMap[r.job_role].levels[r.level] = 1;
    childMap[r.job_role].titles[r.job_title] = 1;
  });
  var childRoles = Object.keys(childMap).map(function (k) { return childMap[k]; })
    .sort(function (a, b) { return b.count - a.count; });

  function roleNodeHtml(node, opts) {
    opts = opts || {};
    var lvl = Object.keys(node.levels).map(Number).sort(function (a, b) { return a - b; })
      .map(function (l) { return "L" + l; }).join("/");
    var titles = Object.keys(node.titles);
    var meta = [lvl || null, titles.length <= 2 ? titles.join(", ") : titles.length + " titles",
      node.count ? node.count + (node.count === 1 ? " person" : " people") : null]
      .filter(Boolean).join(" · ");
    var clickable = !opts.current && roleIndex[node.role];
    var tag = clickable ? "button" : "div";
    var cls = "rel-node" + (opts.current ? " current" : "") + (clickable ? " clickable" : "");
    var attrs = clickable ? ' type="button" data-goto-role="' + esc(node.role) + '"' : "";
    return (
      "<" + tag + ' class="' + cls + '"' + attrs + ">" +
        '<div class="t">' + esc(node.role) + (opts.current ? " · this role" : "") + "</div>" +
        (meta ? '<div class="m">' + esc(meta) + "</div>" : "") +
      "</" + tag + ">"
    );
  }

  var currentNode = {
    role: activeRole,
    levels: levels.reduce(function (acc, l) { acc[l] = 1; return acc; }, {}),
    titles: titles.reduce(function (acc, t) { acc[t] = 1; return acc; }, {}),
    count: people.length
  };

  var relParts = [];
  if (parentRoles.length) {
    relParts.push('<div class="rel-group">' + parentRoles.map(function (r) {
      return roleNodeHtml(r);
    }).join("") + "</div>");
    relParts.push('<div class="rel-link">↓ reports into</div>');
  } else if (Object.keys(unresolvedManagers).length) {
    relParts.push(
      '<div class="rel-empty">Manager listed in data but not present as an employee record: ' +
      esc(Object.keys(unresolvedManagers).join(", ")) + "</div>"
    );
    relParts.push('<div class="rel-link">↓</div>');
  }

  relParts.push(roleNodeHtml(currentNode, { current: true }));

  if (childRoles.length) {
    relParts.push('<div class="rel-link">↓ roles reporting in</div>');
    relParts.push('<div class="rel-group">' + childRoles.map(function (r) {
      return roleNodeHtml(r);
    }).join("") + "</div>");
  } else {
    relParts.push('<div class="rel-empty" style="margin-top:10px">No roles report into this role in the dataset.</div>');
  }

  var relHtml = '<div class="rel"><div class="rel-stack">' + relParts.join("") + "</div></div>";

  var areasHtml = wa
    ? '<div class="areas">' + wa.areas.map(function (w) {
        return (
          '<article class="area ' + w.estimated_weight + '">' +
            '<div class="area-top"><h3>' + esc(w.label) + "</h3>" +
            '<span class="weight">' + esc(w.estimated_weight) + " time</span></div>" +
            "<ol>" + w.activities.map(function (a) { return "<li>" + esc(a) + "</li>"; }).join("") + "</ol>" +
          "</article>"
        );
      }).join("") + "</div>"
    : '<div class="missing">No key work areas payload supplied for this role yet.</div>';

  main.innerHTML =
    '<div class="crumb">' +
      "<strong>Job Architecture</strong><span class=\"sep\">/</span>" +
      "<span>" + esc(dept) + "</span><span class=\"sep\">/</span>" +
      "<span>" + esc(sub) + "</span><span class=\"sep\">/</span>" +
      "<strong>" + levels.map(function (l) { return "L" + l; }).join("/") + "</strong><span class=\"sep\">/</span>" +
      "<strong>" + esc(activeRole) + "</strong>" +
    "</div>" +
    '<div class="main-head"><div>' +
      "<h1>" + esc(displayTitle) + "</h1>" +
      '<div class="subline">' + esc(activeRole) + " · " + people.length + " people</div>" +
    "</div></div>" +

    '<section class="q">' +
      '<div class="q-head"><span class="q-num">1</span><h2>Where does this role belong?</h2></div>' +
      '<div class="place">' +
        '<div class="place-card"><div class="k">Department</div><div class="v">' + esc(dept) + "</div></div>" +
        '<div class="place-card"><div class="k">Sub-department</div><div class="v">' + esc(sub) + "</div></div>" +
        '<div class="place-card"><div class="k">Career level</div><div class="v">' +
          levels.map(function (l) { return "L" + l; }).join(", ") + "</div></div>" +
        '<div class="place-card"><div class="k">Job titles</div><div class="v">' + esc(titles.join(", ")) + "</div></div>" +
      "</div>" +
    "</section>" +

    '<section class="q">' +
      '<div class="q-head"><span class="q-num">2</span><h2>How does this role relate to other roles?</h2></div>' +
      relHtml +
    "</section>" +

    '<section class="q">' +
      '<div class="q-head"><span class="q-num">3</span><h2>What work is expected?</h2></div>' +
      areasHtml +
    "</section>" +

    '<section class="q">' +
      '<div class="q-head"><span class="q-num">4</span><h2>What differentiates this role?</h2></div>' +
      '<div class="diff">' +
        diff.map(function (row) {
          return '<div class="diff-item"><div class="k">' + esc(row[0]) + '</div><div class="v">' +
            esc(row[1]) + "</div></div>";
        }).join("") +
      "</div>" +
    "</section>";

  document.querySelectorAll("[data-goto-role]").forEach(function (btn) {
    btn.onclick = function () {
      activeRole = btn.getAttribute("data-goto-role");
      render();
    };
  });
}

function render() {
  renderTree();
  renderMain();
}

render();
</script>
</body>
</html>
