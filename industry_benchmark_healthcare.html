<html>
<head>
  <meta charset="UTF-8">
  <title>Success Capabilities Viewer</title>
  <style>
    :root {
      --bg: #f0f2f8;
      --bg-accent: linear-gradient(145deg, #eef2ff 0%, #f8fafc 45%, #f0fdf9 100%);
      --surface: #ffffff;
      --surface-elevated: #fafbfc;
      --border: rgba(15, 23, 42, 0.08);
      --border-strong: rgba(15, 23, 42, 0.12);
      --text: #0f172a;
      --text-muted: #64748b;
      --text-soft: #94a3b8;
      --accent: #4f46e5;
      --accent-soft: rgba(79, 70, 229, 0.12);
      --accent-text: #4338ca;
      --success: #059669;
      --success-soft: rgba(5, 150, 105, 0.1);
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 4px 16px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 12px 40px rgba(15, 23, 42, 0.1);
      --radius: 14px;
      --radius-sm: 10px;
      --font: "SF Pro Text", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      background-image: var(--bg-accent);
      min-height: 100vh;
      margin: 0;
      padding: 28px 20px 48px;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .page-shell {
      max-width: 920px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 8px;
      color: var(--text);
    }

    .page-lead {
      text-align: center;
      font-size: 0.95rem;
      color: var(--text-muted);
      margin: 0 0 32px;
      line-height: 1.5;
    }

    /* —— Dataset source cards —— */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm), var(--shadow-md);
      transition: box-shadow 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .card:hover {
      border-color: var(--border-strong);
      box-shadow: var(--shadow-md), var(--shadow-lg);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      cursor: pointer;
    }

    .title {
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: -0.02em;
      line-height: 1.35;
      color: var(--text);
    }

    .meta {
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 500;
      white-space: nowrap;
      padding: 6px 10px;
      background: var(--surface-elevated);
      border-radius: 999px;
      border: 1px solid var(--border);
    }

    .content {
      margin-top: 14px;
      padding-top: 4px;
      display: none;
    }

    .capability {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin: 10px 0;
      background: var(--surface-elevated);
      transition: border-color 0.15s ease;
    }

    .capability:hover {
      border-color: var(--border-strong);
    }

    .rank {
      font-weight: 600;
      color: var(--text);
      font-size: 0.9rem;
      letter-spacing: -0.01em;
    }

    .mapped {
      margin-top: 8px;
      font-size: 0.8125rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-left: 8px;
      vertical-align: middle;
    }

    .strong { background: #d1fae5; color: #047857; }
    .loose { background: #fef3c7; color: #b45309; }
    .none { background: #fee2e2; color: #b91c1c; }

    .header-sub {
      font-size: 0.72rem;
      color: var(--text-soft);
      margin-top: 8px;
      line-height: 1.5;
    }

    .detail-block {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 0.875rem;
      line-height: 1.55;
    }

    .detail-label {
      font-weight: 600;
      color: var(--text);
      display: block;
      margin-bottom: 8px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .detail-block p,
    .detail-block ul {
      margin: 0;
      color: var(--text-muted);
    }

    .detail-block ul {
      padding-left: 1.25rem;
    }

    .excerpt {
      background: var(--surface-elevated);
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      white-space: pre-wrap;
      font-size: 0.8125rem;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .mapped-code {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .extra-fields {
      margin-top: 8px;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .extra-fields pre {
      margin: 8px 0 0;
      padding: 10px 12px;
      background: var(--surface-elevated);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      overflow-x: auto;
      font-size: 0.68rem;
    }

    /* —— Section titles (LLM groups) —— */
    h2 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin: 0 0 14px;
    }

    /* —— Aggregated leaderboard —— */
    .agg-section {
      margin-bottom: 40px;
    }

    .agg-hero {
      text-align: center;
      margin-bottom: 20px;
    }

    .agg-title {
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.035em;
      margin: 0 0 8px;
      background: linear-gradient(120deg, var(--accent-text) 0%, #0d9488 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .agg-subtitle {
      margin: 0;
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
      max-width: 36rem;
      margin-left: auto;
      margin-right: auto;
    }

    .card--aggregate {
      padding: 8px 10px 12px;
      background: linear-gradient(180deg, #ffffff 0%, #fafbff 100%);
      border: 1px solid rgba(79, 70, 229, 0.15);
      box-shadow: var(--shadow-md), 0 0 0 1px rgba(255, 255, 255, 0.8) inset;
    }

    .agg-row {
      display: flex;
      align-items: stretch;
      gap: 14px;
      padding: 12px 12px;
      margin: 6px 0;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--border);
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    .agg-row:hover {
      background: #fafbff;
      border-color: rgba(79, 70, 229, 0.2);
    }

    .agg-rank {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.95rem;
      color: var(--accent-text);
      background: var(--accent-soft);
      border-radius: 12px;
      align-self: center;
    }

    .agg-row:nth-child(1) .agg-rank {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      color: #92400e;
    }

    .agg-row:nth-child(2) .agg-rank {
      background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
      color: #475569;
    }

    .agg-row:nth-child(3) .agg-rank {
      background: linear-gradient(135deg, #ffedd5 0%, #fed7aa 100%);
      color: #9a3412;
    }

    .agg-row-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .agg-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.35;
    }

    .agg-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .agg-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--surface-elevated);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .agg-pill--highlight {
      background: var(--success-soft);
      color: var(--success);
      border-color: rgba(5, 150, 105, 0.25);
    }

    .agg-pill-label {
      font-weight: 500;
      opacity: 0.85;
    }

    @media (max-width: 540px) {
      .agg-row {
        flex-wrap: wrap;
      }
      .agg-rank {
        width: 36px;
        height: 36px;
        font-size: 0.85rem;
      }
      .header {
        flex-direction: column;
      }
      .meta {
        align-self: flex-start;
      }
    }
  </style>
</head>

    function escapeHtml(value) {
      if (value == null) return "";
      const div = document.createElement("div");
      div.textContent = String(value);
      return div.innerHTML;
    }

    function formatSourceUrl(url) {
      if (url == null || url === "") {
        return '<span class="meta">Source URL: not provided</span>';
      }
      const safe = escapeHtml(url);
      return `<a href="${safe}" target="_blank" rel="noopener noreferrer">${safe}</a>`;
    }

      "source_name",

      "rank",

      "mapped_capability",
      "match_type",
    ]);

    const MAPPED_CAP_KNOWN_KEYS = new Set(["code", "name", "description"]);

    function extraJson(obj, knownKeys) {
      const extra = {};
      if (!obj || typeof obj !== "object") return extra;
      for (const k of Object.keys(obj)) {
        if (!knownKeys.has(k)) extra[k] = obj[k];
      }
      return extra;

    // --- Aggregated top capabilities (data1–data5; does not alter datasets below) ---
    (function renderAggregatedTopCapabilities2026() {
      const T = 20;

      const COUNTED_MATCH_TYPES = new Set([
        "exact",
        "semantic_strong",
        "semantic_loose",
      ]);

      /**
       * Aggregation key for matched rows: exact / semantic_strong / semantic_loose share the same
       * taxonomy rollup when mapped_capability is present; otherwise original_capability.
       */
      function aggKeyLabelFromMatchedCap(cap) {
        if (!cap || typeof cap !== "object") return null;
        const nameRaw = cap.original_capability;
        if (nameRaw == null) return null;
        const original = String(nameRaw).trim();
        if (original === "") return null;

        const mc = cap.mapped_capability;
        let key;
        let label;

        if (mc && typeof mc === "object") {
          const code = mc.code != null ? String(mc.code).trim() : "";
          if (code !== "") {
            key = "tc|" + code;
            const mapName = mc.name != null ? String(mc.name).trim() : "";
            label = mapName !== "" ? mapName : code;
          } else {
            const mapName = mc.name != null ? String(mc.name).trim() : "";
            if (mapName !== "") {
              key = "tn|" + mapName;
              label = mapName;
            } else {
              key = "or|" + original;
              label = original;
            }
          }
        } else {
          key = "or|" + original;
          label = original;
        }

        return { key, label };
      }

      /**
       * Within one source: ignore match_type "none" entirely. Only exact / semantic_strong /
       * semantic_loose contribute. Rows are sorted by original rank; a new order 1..M is applied
       * and score = (Tuse − newRank + 1) / Tuse with Tuse = max(T, M). All counted match types
       * use the same scoring and taxonomy rollup rules.
       * Returns key -> { score, label }.
       */
      function scoresByNameForSource(source) {
        const map = Object.create(null);
        const caps = source && source.top_capabilities;
        if (!Array.isArray(caps)) return map;

        const matched = [];
        for (let i = 0; i < caps.length; i++) {
          const cap = caps[i];
          if (!cap || typeof cap !== "object") continue;
          const mt = cap.match_type;
          if (!COUNTED_MATCH_TYPES.has(mt)) continue;
          const rank = Number(cap.rank);
          if (!Number.isFinite(rank) || rank < 1) continue;
          const kl = aggKeyLabelFromMatchedCap(cap);
          if (!kl) continue;
          matched.push({ cap, rank, kl });
        }

        matched.sort((a, b) => a.rank - b.rank);

        const M = matched.length;
        if (M === 0) return map;
        const Tuse = Math.max(T, M);

        for (let i = 0; i < M; i++) {
          const newRank = i + 1;
          const raw = (Tuse - newRank + 1) / Tuse;
          if (!Number.isFinite(raw)) continue;
          const score = Math.max(0, raw);
          const { key, label } = matched[i].kl;
          if (!map[key]) {
            map[key] = { score: 0, label };
          }
          map[key].score += score;
        }
        return map;

      for (let d = 0; d < datasetArrays.length; d++) {
        const D = datasetArrays[d];
        if (!D.length) continue;
        for (let s = 0; s < D.length; s++) {
          allSources.push(D[s]);
        }
      }
      const totalSources = allSources.length;
      if (totalSources === 0) {
        return;
      }

      /**
       * Per capability: exact + semantic_strong + semantic_loose share buckets via taxonomy when mapped;
       * otherwise original_capability. "none" rows are excluded from scores and from rank order.
       */

      for (let s = 0; s < totalSources; s++) {
        const perSource = scoresByNameForSource(allSources[s]);
        for (const aggKey of Object.keys(perSource)) {
          const cell = perSource[aggKey];
          if (!bucket[aggKey]) {
            bucket[aggKey] = {
              sumScores: 0,
              sourceCount: 0,
              label: cell.label,
            };
          }
          bucket[aggKey].sumScores += cell.score;
          bucket[aggKey].sourceCount += 1;
        }
      }

      const ranked = [];
      for (const aggKey of Object.keys(bucket)) {
        const b = bucket[aggKey];
        const sum = b.sumScores;
        const avg = sum / totalSources;
        ranked.push({
          name: b.label,
          count: b.sourceCount,
          sumScores: sum,
          avgScore: Number.isFinite(avg) ? avg : 0,
        });
      }

      aggHero.appendChild(aggTitle);
      aggHero.appendChild(aggSub);

        pill.className = "agg-pill" + (highlight ? " agg-pill--highlight" : "");
        const lab = document.createElement("span");

        pill.appendChild(lab);

        return pill;

        main.appendChild(nameEl);
        main.appendChild(metrics);
        rowEl.appendChild(badge);
        rowEl.appendChild(main);
        aggCard.appendChild(rowEl);

            const mcExtra = extraJson(mc, MAPPED_CAP_KNOWN_KEYS);

              Object.keys(mcExtra).length > 0
                ? `<div class="extra-fields"><span class="detail-label">Additional fields (mapped capability)</span><pre>${escapeHtml(
                    JSON.stringify(mcExtra, null, 2)
                  )}</pre></div>`
                : "";
            mappedHtml = `<div class="mapped">
              <b>${escapeHtml(mc.name ?? "")}</b><br/>
              ${codeLine}${desc}
              ${mcExtraHtml}
            </div>`;
          }

          const capExtra = extraJson(cap, CAP_KNOWN_KEYS);
          const capExtraHtml =
            Object.keys(capExtra).length > 0
              ? `<div class="extra-fields"><span class="detail-label">Additional fields (capability)</span><pre>${escapeHtml(
                  JSON.stringify(capExtra, null, 2)
                )}</pre></div>`
              : "";
  
          capDiv.innerHTML = `
            <div class="rank">#${escapeHtml(String(rank))} — ${orig}
              <span class="tag ${
                matchType === 'semantic_strong'
                  ? 'strong'
                  : matchType === 'semantic_loose'
                  ? 'loose'
                  : 'none'
              }">
                ${escapeHtml(matchType)}
              </span>
            </div>
            ${mappedHtml}
            ${capExtraHtml}
          `;
  
          content.appendChild(capDiv);
        });

        const unmapped = source.unmapped_capabilities || [];
        const unmappedBlock = document.createElement("div");
        unmappedBlock.className = "detail-block";
        unmappedBlock.innerHTML =
          `<span class="detail-label">Unmapped capabilities</span>` +
          (unmapped.length === 0

        content.appendChild(unmappedBlock);
